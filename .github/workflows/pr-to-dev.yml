name: PR to dev

on:
  pull_request:
    branches: [dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest httpx

      - name: Run unit + integration tests
        working-directory: backend
        run: pytest -v tests/test_unit.py tests/test_integration.py

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image (no push)
        run: docker build -t credit-backend ./backend

      - name: Build frontend image (no push)
        run: docker build -t credit-frontend ./frontend