name: staging to main (promotion)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  promote-model:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull data with DVC
        env:
          DAGSHUB_TOKEN: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          dvc remote modify origin --local access_key_id $DAGSHUB_TOKEN
          dvc remote modify origin --local secret_access_key $DAGSHUB_TOKEN
          dvc pull

      - name: Run quality gates
        run: python ml/evaluate.py

      - name: Promote model if gates passed
        run: python ml/promote.py